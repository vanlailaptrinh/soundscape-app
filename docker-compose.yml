version: '3.8'

services:
  # 1. PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: soundscape_db
    environment:
      POSTGRES_DB: tmdt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - soundscape-network
    restart: unless-stopped

  # 2. Redis
  redis:
    image: redis:7-alpine
    container_name: soundscape_redis
    ports:
      - "6379:6379"
    networks:
      - soundscape-network
    restart: unless-stopped

  # 3. Spring Boot Backend
  backend:
    build: 
      context: .
      dockerfile: Dockerfile
    image: vantrandevops/soundscape-app:latest
    container_name: soundscape_backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Ghi đè cấu hình để dùng service name thay vì localhost
      - DB_URL=jdbc:postgresql://postgres:5432/tmdt
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis
    networks:
      - soundscape-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  soundscape-network:
    driver: bridge
