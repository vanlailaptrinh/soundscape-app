name: Deploy Soundscape to Dell AlmaLinux

on:
  push:
    branches:
      - main

concurrency:
  group: soundscape-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Show runner info
        run: |
          hostname
          whoami
          pwd
          docker version
          docker compose version

      - name: Build backend Docker image
        run: |
          docker build -t vantrandevops/soundscape-app:latest_final .

      - name: Recreate backend container only
        run: |
          cd /opt/soundscape
          docker compose up -d --no-deps --force-recreate backend

      - name: Check containers
        run: |
          cd /opt/soundscape
          docker compose ps
          docker ps

      - name: Clean unused Docker images
        run: |
          docker image prune -f