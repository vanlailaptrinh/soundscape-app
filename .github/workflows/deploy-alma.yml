name: Deploy Soundscape to Dell AlmaLinux

on:
  push:
    branches:
      - main

concurrency:
  group: soundscape-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: self-hosted
    env:
      DEPLOY_DIR: /home/azureuser/cdw

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Show runner info
        run: |
          hostname
          whoami
          pwd
          docker version
          docker compose version

      - name: Prepare Docker image tag
        run: |
          echo "BACKEND_IMAGE_TAG=${GITHUB_SHA::12}" >> "$GITHUB_ENV"
          echo "BACKEND_IMAGE=vantrandevops/soundscape-app:${GITHUB_SHA::12}" >> "$GITHUB_ENV"
          echo "BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Build backend Docker image
        run: |
          docker build \
            --build-arg GIT_COMMIT="$GITHUB_SHA" \
            --build-arg IMAGE_TAG="$BACKEND_IMAGE_TAG" \
            --build-arg BUILD_TIME="$BUILD_TIME" \
            -t "$BACKEND_IMAGE" \
            -t vantrandevops/soundscape-app:latest \
            .

      - name: Recreate backend container only
        run: |
          test -f "$DEPLOY_DIR/docker-compose.yml"
          cat > "$RUNNER_TEMP/backend-image.override.yml" <<EOF
          services:
            backend:
              image: $BACKEND_IMAGE
          EOF
          cd "$DEPLOY_DIR"
          docker compose -f docker-compose.yml -f "$RUNNER_TEMP/backend-image.override.yml" up -d --no-deps --force-recreate backend

      - name: Check containers
        run: |
          cd "$DEPLOY_DIR"
          docker compose ps
          docker ps

      - name: Clean unused Docker images
        run: |
          docker image prune -f

# test CI/CD